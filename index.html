                                                        newSecs[sIdx].packages.push({ id: Date.now(), name: 'אופציה חדשה', price: 0, isOneTime: false });
                                                        updateConfigValue(['customSections'], newSecs);
                                                    }} className="text-sm font-bold text-blue-600 bg-blue-50 px-4 py-2 rounded-lg mt-2 inline-flex items-center gap-1">+ הוסף אופציית בחירה</button>
                                                </div>
                                            </div>
                                        ))}
                                        
                                        <div className="flex gap-4 bg-blue-50 p-6 rounded-3xl border border-blue-200 items-center mt-6">
                                            <div className="flex-grow">
                                                <label className="text-xs font-bold text-blue-800 mb-1 block">יצירת קטגוריית אומדן חדשה</label>
                                                <input value={newSectionTitle} onChange={e => setNewSectionTitle(e.target.value)} placeholder="למשל: סביבות ענן / שרתים..." className="w-full p-3 border rounded-xl bg-white font-bold"/>
                                            </div>
                                            <button onClick={addNewSection} className="bg-blue-700 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-800 shadow-lg mt-5">הקם אזור</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- אזור הדפסה מיוחד לצרכים פנימיים (PDF) --- */}
                    <div id="print-area">
                        <div className="print-container">
                            
                            {/* כותרת ולוגואים */}
                            <div className="avoid-break" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', borderBottom: '3px solid #2563eb', paddingBottom: '20px', marginBottom: '30px' }}>
                                <div>
                                    <img src="oneflowlogo.png" alt="ONEFLOW 360 PRO" style={{ height: '45px', marginBottom: '15px' }} onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }} />
                                    <h1 style={{ display: 'none' }}>אומדן עלויות פרויקט: ONEFLOW 360 PRO</h1>
                                    <div className="print-sub-header">
                                        <p><strong>לקוח / פרויקט:</strong> {clientName || "לא צוין"}</p>
                                        <p><strong>מיישם עורך האומדן:</strong> {implementerName || "לא צוין"}</p>
                                        <p><strong>תאריך הפקה:</strong> {new Date(quoteDate).toLocaleDateString('he-IL')}</p>
                                    </div>
                                </div>
                                <div style={{ textAlign: 'left' }}>
                                    <img src="onebtnlogo.png" alt="ONEBTN" style={{ height: '40px', marginBottom: '5px' }} onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='block'; }} />
                                    <h2 style={{ display: 'none', margin: 0, fontSize: '22pt', color: '#2563eb', border: 'none' }}>ONEBTN</h2>
                                    <p style={{ fontSize: '10pt', letterSpacing: '1px', textTransform: 'uppercase', color: '#64748b' }}>Digital Backbone Solutions</p>
                                </div>
                            </div>

                            <div className="avoid-break">
                                <h2>1. אומדן מודולים ותכולת הפרויקט המרכזית</h2>
                                <table className="print-table">
                                    <thead>
                                        <tr>
                                            <th style={{width:'30%'}}>מודול נדרש</th>
                                            <th style={{width:'15%', textAlign:'center'}}>תצורת גישה</th>
                                            <th style={{width:'20%'}}>היקף משתמשים מורשים</th>
                                            <th style={{width:'20%'}}>מדרגת עומס / פעילות</th>
                                            <th style={{textAlign:'center'}}>אומדן ימים</th>
                                            <th style={{textAlign:'center'}}>סה"כ חודשי ($)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {totals.selectedModulesDetails.map(m => (
                                            <tr key={m.id}>
                                                <td>
                                                    <div style={{fontWeight:'bold', fontSize:'11pt', color:'#1e293b'}}>{m.name}</div>
                                                    {m.note && <div style={{fontSize:'9pt', color:'#64748b', marginTop:'4px'}}>{m.note}</div>}
                                                </td>
                                                <td style={{textAlign:'center'}}>
                                                    <span className={`badge ${m.accessType === 'public' ? 'badge-public' : 'badge-private'}`}>
                                                        {m.accessType === 'public' ? 'חיצוני (Public)' : 'פנימי (Private)'}
                                                    </span>
                                                </td>
                                                <td>{m.selectedUserPkgName}</td>
                                                <td>{m.selectedTierName}</td>
                                                <td style={{textAlign:'center', fontWeight:'bold', color:'#ea580c'}}>{m.setupDays}</td>
                                                <td style={{textAlign:'center', fontWeight:'bold', fontSize:'11pt'}}>${m.monthlyPrice.toLocaleString()}</td>
                                            </tr>
                                        ))}
                                        <tr style={{backgroundColor:'#f1f5f9', borderTop:'2px solid #cbd5e1'}}>
                                            <td colSpan="4" style={{fontWeight:'bold', fontSize:'11pt'}}>סה"כ לתשתית מודולים:</td>
                                            <td style={{textAlign:'center', fontWeight:'bold', color:'#c2410c'}}>{totals.totalSetupDays} ימים</td>
                                            <td style={{textAlign:'center', fontWeight:'bold', color:'#1e3a8a', fontSize:'12pt'}}>${totals.modulesMRR.toLocaleString()}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* נציג את טבלת התוספות רק אם יש משהו להציג בתוכה */}
                            {(config.enableGlobalTiers || (config.enableAI && totals.aiObj.price > 0) || totals.customItems.length > 0) && (
                                <div className="avoid-break">
                                    <h2>2. שירותים גלובליים ותוספות מערכת</h2>
                                    <table className="print-table">
                                        <thead>
                                            <tr>
                                                <th>רכיב / שירות משלים</th>
                                                <th>פירוט היקף</th>
                                                <th style={{textAlign:'center', width:'100px'}}>סוג אומדן</th>
                                                <th style={{textAlign:'center', width:'100px'}}>עלות ($)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {config.enableGlobalTiers && (
                                                <tr>
                                                    <td style={{fontWeight:'bold'}}>חבילת טרנזקציות ומסמכים גלובלית</td>
                                                    <td>{totals.globalTierObj.name} (עד {totals.globalTierObj.limit.toLocaleString()})</td>
                                                    <td style={{textAlign:'center'}}><span className="badge">חודשי (MRR)</span></td>
                                                    <td style={{textAlign:'center', fontWeight:'bold'}}>${totals.globalTierObj.price.toLocaleString()}</td>
                                                </tr>
                                            )}
                                            {/* AI Row */}
                                            {config.enableAI && totals.aiObj.price > 0 && (
                                                <tr>
                                                    <td style={{fontWeight:'bold', color:'#7c3aed'}}>יכולות AI: {totals.aiObj.name}</td>
                                                    <td>{totals.aiObj.description}</td>
                                                    <td style={{textAlign:'center'}}>
                                                        <span className="badge" style={{backgroundColor: totals.aiObj.isOneTime ? '#fff7ed' : '#eff6ff', color: totals.aiObj.isOneTime ? '#c2410c' : '#1e40af'}}>
                                                            {totals.aiObj.isOneTime ? 'חד-פעמי' : 'חודשי'}
                                                        </span>
                                                    </td>
                                                    <td style={{textAlign:'center', fontWeight:'bold'}}>${totals.aiObj.price.toLocaleString()}</td>
                                                </tr>
                                            )}
                                            {/* Custom Rows */}
                                            {totals.customItems.map((item, idx) => (
                                                <tr key={idx}>
                                                    <td style={{fontWeight:'bold'}}>{item.sectionTitle}: {item.name}</td>
                                                    <td>{item.description || 'ללא פירוט נוסף'}</td>
                                                    <td style={{textAlign:'center'}}>
                                                        <span className="badge" style={{backgroundColor: item.isOneTime ? '#fff7ed' : '#eff6ff', color: item.isOneTime ? '#c2410c' : '#1e40af'}}>
                                                            {item.isOneTime ? 'חד-פעמי' : 'חודשי'}
                                                        </span>
                                                    </td>
                                                    <td style={{textAlign:'center', fontWeight:'bold'}}>${item.price.toLocaleString()}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            <div className="summary-box avoid-break">
                                <h3 style={{marginTop:0, borderBottom:'none', fontSize:'18pt', color:'#1e3a8a'}}>סיכום אומדן כולל לפרויקט</h3>
                                
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', marginBottom:'20px'}}>
                                    <div style={{fontSize:'14pt', fontWeight:'bold'}}>סה"כ אומדן חיוב חודשי קבוע (MRR):</div>
                                    <div style={{textAlign:'left'}}>
                                        <div style={{fontSize:'24pt', fontWeight:'900', color:'#1e3a8a', lineHeight:1}}>${totals.totalMRR.toLocaleString()}</div>
                                        <div style={{fontSize:'11pt', color:'#64748b', marginTop:'5px'}}>≈ {Math.round(totals.nisMRR).toLocaleString()} ₪</div>
                                    </div>
                                </div>

                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-end', paddingTop:'20px', borderTop:'2px dashed #cbd5e1'}}>
                                    <div>
                                        <div style={{fontSize:'14pt', fontWeight:'bold', color:'#c2410c'}}>סה"כ אומדן עלות הקמה ופיתוח חד-פעמית (Setup):</div>
                                        <div style={{fontSize:'11pt', color:'#ea580c', marginTop:'5px'}}>נגזר משעות עבודה מוערכות: ({totals.totalSetupDays} ימי עבודה של מיישם/מפתח)</div>
                                    </div>
                                    <div style={{textAlign:'left'}}>
                                        <div style={{fontSize:'24pt', fontWeight:'900', color:'#c2410c', lineHeight:1}}>${totals.totalSetup.toLocaleString()}</div>
                                        <div style={{fontSize:'11pt', color:'#9a3412', marginTop:'5px'}}>≈ {Math.round(totals.nisSetup).toLocaleString()} ₪</div>
                                    </div>
                                </div>
                            </div>

                            <div className="avoid-break" style={{marginTop:'50px', textAlign:'center', fontSize:'10pt', color:'#64748b', borderTop:'1px solid #e2e8f0', paddingTop:'20px'}}>
                                <p style={{fontWeight:'bold', color:'#ef4444', fontSize:'12pt'}}>מסמך אומדן זה מיועד לשימוש פנימי בלבד לשם הערכת עלויות טרם הפקת הצעת מחיר רשמית.</p>
                                <p className="mt-2">המחירים אינם כוללים מע"מ | מחושב לפי שער המרה פנימי של: {config.exchangeRate} ₪</p>
                                <p style={{fontWeight:'bold', marginTop:'10px', color:'#1e293b'}}>ONEFLOW PRO ERP Hybrid Infrastructure - Internal Pricing Tool</p>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
