<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONEFLOW 360 - אומדן עלויות פרויקט</title>
    
    <!-- טעינת ספריות חיצוניות (גרסה יציבה) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- פונטים -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Heebo', sans-serif; 
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        /* התאמת סליידרים ל-RTL */
        input[type="range"] { direction: ltr; }

        /* גלילה נעימה */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background-color: transparent; }

        /* --- הגדרות הדפסה (PDF) משודרגות --- */
        @media print {
            @page { 
                size: A4; 
                margin: 15mm 10mm;
            }
            body { background-color: white !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; margin: 0; padding: 0; }
            
            /* הסתרת כל מה שלא קשור להדפסה */
            .no-print, header, button, .admin-modal, .mobile-bar { display: none !important; }
            
            /* הצגת אזור ההדפסה בלבד */
            #print-area { 
                display: block !important; 
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                z-index: 9999;
                background: white;
            }

            .print-container { padding: 0 10px; }
            
            /* מניעת חיתוך אלמנטים במעברי עמוד */
            .avoid-break {
                page-break-inside: avoid;
                break-inside: avoid;
                margin-bottom: 30px;
            }

            h1 { font-size: 24pt !important; font-weight: 900 !important; color: #1e3a8a !important; margin: 0; }
            .print-sub-header { color: #64748b !important; font-size: 11pt !important; margin-top: 10px; }
            
            h2 { 
                font-size: 16pt !important; 
                font-weight: 800 !important; 
                color: #1e293b !important; 
                margin-top: 0 !important; 
                margin-bottom: 10px !important; 
                border-bottom: 2px solid #e2e8f0 !important;
                padding-bottom: 5px !important;
            }

            /* טבלה נקייה */
            table { width: 100%; border-collapse: collapse; font-size: 10pt; }
            th { background-color: #f1f5f9 !important; padding: 8px; text-align: right; font-weight: 800; border: 1px solid #e2e8f0; }
            td { padding: 8px; border: 1px solid #e2e8f0; vertical-align: top; }
            
            /* קופסאות סיכום */
            .summary-box {
                background-color: #f8fafc !important;
                border: 2px solid #cbd5e1 !important;
                border-radius: 12px;
                padding: 15px;
            }

            .badge { 
                border: 1px solid #ddd; 
                padding: 2px 6px; 
                border-radius: 4px; 
                font-size: 8pt; 
                font-weight: bold; 
            }
            .badge-public { background-color: #dbeafe !important; color: #1e40af !important; border-color: #bfdbfe !important; }
            .badge-private { background-color: #f3e8ff !important; color: #6b21a8 !important; border-color: #e9d5ff !important; }
        }
        
        #print-area { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // רכיב אייקון דינמי
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [name]); 
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const ICON_LIST = [
            'shopping-cart', 'package', 'layers', 'truck', 'megaphone', 'mail', 'briefcase', 'bar-chart-3',
            'activity', 'users', 'puzzle', 'globe', 'shield', 'zap', 'coins', 'hammer', 'clock', 'calendar',
            'database', 'settings', 'check-circle-2', 'file-text', 'server', 'smartphone', 'wifi', 'box', 'copy',
            'download', 'upload', 'lock', 'unlock'
        ];

        const generateDefaultTiers = (moduleId) => [
            { id: `${moduleId}_t1`, name: 'בסיסי (עד 1,000)', price: 100 },
            { id: `${moduleId}_t2`, name: 'מתקדם (עד 5,000)', price: 250 },
            { id: `${moduleId}_t3`, name: 'ללא הגבלה', price: 500 }
        ];

        // --- נתוני ברירת מחדל ---
        const DEFAULT_CONFIG = {
            enableGlobalTiers: true,
            enableAI: true,
            exchangeRate: 3.7, 
            setupHourlyRate: 350,
            setupHoursPerDay: 9,
            uiText: {
                modulesHeader: "רכיב א': בחירת מודולים נדרשים",
                moduleTreeHeader: "רכיב ב': עץ בניית מודולים (הגדרות גישה ועומסים)",
                tiersHeader: "רכיב ג': חבילת טרנזקציות ומסמכים גלובלית",
                aiHeader: "רכיב ד': שילוב AI",
            },
            // חבילות משתמשים לפי סוג חשיפה
            publicUserPackages: [
                { id: 'pub_1', name: 'עד 100 משתמשי קצה', price: 50 },
                { id: 'pub_2', name: 'עד 1,000 משתמשי קצה', price: 150 },
                { id: 'pub_3', name: 'ללא הגבלה', price: 400 },
            ],
            privateUserPackages: [
                { id: 'priv_1', name: 'עד 5 משתמשי פנים', price: 100 },
                { id: 'priv_2', name: 'עד 20 משתמשי פנים', price: 300 },
                { id: 'priv_3', name: 'ללא הגבלה', price: 800 },
            ],
            modules: [
                { id: 'sales', name: 'מכירות', icon: 'shopping-cart', setupDays: 3, note: '', tiers: generateDefaultTiers('sales') },
                { id: 'inventory', name: 'מלאי', icon: 'package', setupDays: 5, note: '', tiers: generateDefaultTiers('inventory') },
                { id: 'picking', name: 'ליקוט', icon: 'layers', setupDays: 4, note: '', tiers: generateDefaultTiers('picking') },
                { id: 'shipping', name: 'שילוח', icon: 'truck', setupDays: 2, note: '', tiers: generateDefaultTiers('shipping') },
                { id: 'bi', name: 'BI & דוחות', icon: 'bar-chart-3', setupDays: 5, note: '', tiers: generateDefaultTiers('bi') },
            ],
            globalTiers: [
                { id: 'S', name: 'Tier S (Basic)', limit: 200, price: 150 },
                { id: 'M', name: 'Tier M (Growth)', limit: 1000, price: 450 },
                { id: 'L', name: 'Tier L (Scale)', limit: 5000, price: 1200 },
                { id: 'ENT', name: 'Tier ENT', limit: 15000, price: 3000 },
            ],
            aiPackages: [
                { id: 'none', name: 'ללא AI', price: 0, description: 'תשתית בלבד', limit: 0, isOneTime: false },
                { id: 'starter', name: 'AI Starter', price: 199, description: 'חיזוי בסיסי', limit: 500, isOneTime: false },
                { id: 'pro', name: 'AI Pro', price: 550, description: 'אופטימיזציה בזמן אמת', limit: 2500, isOneTime: false },
            ],
            customSections: [] 
        };

        function App() {
            const STORAGE_KEY = 'oneflow_pro_v_advanced_tree_02';

            const [config, setConfig] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // מיגרציה נתונים אם חסר
                        if (!parsed.publicUserPackages) parsed.publicUserPackages = DEFAULT_CONFIG.publicUserPackages;
                        if (!parsed.privateUserPackages) parsed.privateUserPackages = DEFAULT_CONFIG.privateUserPackages;
                        if (!parsed.globalTiers) parsed.globalTiers = DEFAULT_CONFIG.globalTiers;
                        return parsed;
                    }
                    return DEFAULT_CONFIG;
                } catch { return DEFAULT_CONFIG; }
            });

            // נתוני אומדן (לשימוש פנימי)
            const [clientName, setClientName] = useState('');
            const [implementerName, setImplementerName] = useState(''); // שם המיישם
            const [quoteDate, setQuoteDate] = useState(new Date().toISOString().split('T')[0]);
            
            // בחירות המיישם
            const [selectedModules, setSelectedModules] = useState(['sales', 'inventory']);
            
            // תצורת עץ מודולים: { [moduleId]: { tierId, accessType: 'public'|'private', userPackageId } }
            const [moduleConfigs, setModuleConfigs] = useState({}); 

            const [selectedGlobalTier, setSelectedGlobalTier] = useState('S');
            const [selectedAI, setSelectedAI] = useState('none');
            const [customSelections, setCustomSelections] = useState({});
            
            // UI
            const [isAdminOpen, setIsAdminOpen] = useState(false);
            const [showSummary, setShowSummary] = useState(false);
            const [iconPickerOpen, setIconPickerOpen] = useState(null); 
            const fileInputRef = useRef(null);

            const [newModule, setNewModule] = useState({ name: '', icon: 'package', setupDays: 0, note: '' });
            const [newSectionTitle, setNewSectionTitle] = useState('');

            // Persistence
            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
                if(window.lucide) window.lucide.createIcons();
            }, [config, selectedModules, moduleConfigs, isAdminOpen]);

            // אתחול אוטומטי של הגדרות למודול שסומן
            useEffect(() => {
                const updatedConfigs = { ...moduleConfigs };
                let changed = false;
                selectedModules.forEach(mId => {
                    if (!updatedConfigs[mId]) {
                        const mod = config.modules.find(x => x.id === mId);
                        if (mod) {
                            updatedConfigs[mId] = {
                                tierId: mod.tiers?.[0]?.id || '',
                                accessType: 'private', // ברירת מחדל
                                userPackageId: config.privateUserPackages[0]?.id || ''
                            };
                            changed = true;
                        }
                    }
                });
                if (changed) setModuleConfigs(updatedConfigs);
            }, [selectedModules, config.modules]);

            // --- לוגיקת חישוב ---
            const totals = useMemo(() => {
                let modulesMRR = 0;
                let totalSetupDays = 0;
                const selectedModulesDetails = [];

                selectedModules.forEach(mId => {
                    const mod = config.modules.find(x => x.id === mId);
                    const modConf = moduleConfigs[mId];
                    if (mod && modConf) {
                        totalSetupDays += Number(mod.setupDays || 0);
                        
                        // חישוב מדרגת פעילות
                        const selectedTier = mod.tiers?.find(t => t.id === modConf.tierId) || mod.tiers?.[0];
                        const tierPrice = selectedTier ? selectedTier.price : 0;
                        
                        // חישוב חבילת משתמשים לפי סוג הגישה
                        const userPkgList = modConf.accessType === 'public' ? config.publicUserPackages : config.privateUserPackages;
                        const selectedUserPkg = userPkgList.find(p => p.id === modConf.userPackageId) || userPkgList[0];
                        const userPrice = selectedUserPkg ? selectedUserPkg.price : 0;

                        const totalModulePrice = tierPrice + userPrice;
                        modulesMRR += totalModulePrice;

                        selectedModulesDetails.push({
                            ...mod,
                            accessType: modConf.accessType,
                            selectedTierName: selectedTier ? selectedTier.name : 'בסיסי',
                            tierPrice: tierPrice,
                            selectedUserPkgName: selectedUserPkg ? selectedUserPkg.name : 'ללא משתמשים',
                            userPrice: userPrice,
                            monthlyPrice: totalModulePrice
                        });
                    }
                });

                const globalTierObj = config.enableGlobalTiers ? (config.globalTiers.find(t => t.id === selectedGlobalTier) || config.globalTiers[0]) : { price: 0, name: '' };
                const backboneTotal = modulesMRR + (globalTierObj.price || 0);

                let addonsMRR = 0;
                let addonsSetup = 0;
                const mrrBreakdown = [];
                const setupBreakdown = [];
                
                // AI
                let aiObj = { price: 0, name: '', description: '' };
                if (config.enableAI) {
                    aiObj = config.aiPackages.find(a => a.id === selectedAI) || config.aiPackages[0];
                    if(aiObj.price > 0) {
                        if(aiObj.isOneTime) {
                            addonsSetup += aiObj.price;
                            setupBreakdown.push({ label: `AI: ${aiObj.name}`, price: aiObj.price });
                        } else {
                            addonsMRR += aiObj.price;
                            mrrBreakdown.push({ label: `AI: ${aiObj.name}`, price: aiObj.price });
                        }
                    }
                }

                // Custom Sections
                const customItems = [];
                config.customSections.forEach(sec => {
                    const pkgId = customSelections[sec.id];
                    const pkg = sec.packages.find(p => p.id === pkgId);
                    if(pkg && pkg.price > 0) {
                        if(pkg.isOneTime) {
                            addonsSetup += pkg.price;
                            setupBreakdown.push({ label: `${sec.title}: ${pkg.name}`, price: pkg.price });
                        } else {
                            addonsMRR += pkg.price;
                            mrrBreakdown.push({ label: `${sec.title}: ${pkg.name}`, price: pkg.price });
                        }
                        customItems.push({ ...pkg, sectionTitle: sec.title });
                    }
                });

                const setupLaborCost = totalSetupDays * config.setupHourlyRate * config.setupHoursPerDay;
                const totalSetup = setupLaborCost + addonsSetup;
                const totalMRR = backboneTotal + addonsMRR;

                return {
                    modulesMRR, globalTierObj, backboneTotal,
                    addonsMRR, addonsSetup, customItems, aiObj, mrrBreakdown, setupBreakdown,
                    totalSetupDays, setupLaborCost, totalSetup, totalMRR,
                    selectedModulesDetails,
                    nisMRR: totalMRR * config.exchangeRate,
                    nisSetup: totalSetup * config.exchangeRate
                };
            }, [config, selectedModules, moduleConfigs, selectedGlobalTier, selectedAI, customSelections]);


            const handlePrint = () => window.print();

            function clearUserSelections() {
                if(window.confirm('האם אתה בטוח שברצונך לנקות את כל הבחירות ולהתחיל פרויקט חדש?')) {
                    setClientName('');
                    setImplementerName('');
                    setQuoteDate(new Date().toISOString().split('T')[0]);
                    setSelectedModules([]);
                    setModuleConfigs({});
                    setSelectedGlobalTier('S');
                    setSelectedAI('none');
                    setCustomSelections({});
                }
            }

            const toggleModule = (id) => {
                setSelectedModules(prev => {
                    if (prev.includes(id)) {
                        const newConfigs = { ...moduleConfigs };
                        delete newConfigs[id];
                        setModuleConfigs(newConfigs);
                        return prev.filter(m => m !== id);
                    } else {
                        return [...prev, id];
                    }
                });
            };

            const updateModuleConfig = (moduleId, field, value) => {
                setModuleConfigs(prev => ({
                    ...prev,
                    [moduleId]: {
                        ...prev[moduleId],
                        [field]: value
                    }
                }));
            };
            
            // --- Admin Helpers ---
            const updateConfigValue = (path, val) => {
               const newConfig = JSON.parse(JSON.stringify(config));
               let current = newConfig;
               for(let i=0; i<path.length-1; i++) current = current[path[i]];
               current[path[path.length-1]] = val;
               setConfig(newConfig);
            };

            // הוספת חבילות משתמשים בניהול
            const addUserPackage = (type) => {
                const arrName = type === 'public' ? 'publicUserPackages' : 'privateUserPackages';
                const newPkgs = [...config[arrName]];
                newPkgs.push({ id: `${type}_${Date.now()}`, name: 'חבילה חדשה', price: 100 });
                updateConfigValue([arrName], newPkgs);
            };

            const duplicateModule = (moduleId) => {
                const moduleToCopy = config.modules.find(m => m.id === moduleId);
                if (!moduleToCopy) return;

                const newModuleId = "mod_" + Date.now();
                const copiedModule = JSON.parse(JSON.stringify(moduleToCopy));
                
                copiedModule.id = newModuleId;
                copiedModule.name = `${copiedModule.name} (עותק)`;
                
                if (copiedModule.tiers) {
                    copiedModule.tiers.forEach((t, idx) => {
                        t.id = `t_${Date.now()}_${idx}`;
                    });
                }

                setConfig(prev => ({
                    ...prev,
                    modules: [...prev.modules, copiedModule]
                }));
            };

            const addNewModule = () => {
                if(!newModule.name) return;
                const id = "mod_" + Date.now();
                setConfig(prev => ({ 
                    ...prev, 
                    modules: [...prev.modules, { 
                        ...newModule, 
                        id, 
                        setupDays: Number(newModule.setupDays),
                        note: newModule.note || '',
                        tiers: generateDefaultTiers(id)
                    }] 
                }));
                setNewModule({ name: '', icon: 'package', setupDays: 0, note: '' });
            };

            const addNewSection = () => {
                if(!newSectionTitle) return;
                const id = "sec_" + Date.now();
                setConfig(prev => ({ ...prev, customSections: [...prev.customSections, { id, title: newSectionTitle, packages: [{ id: id+'_0', name: 'לא נבחר', price: 0, isOneTime: false }] }] }));
                setNewSectionTitle('');
            };

            const resetAdminConfig = () => {
                if(window.confirm("לאפס את כל הגדרות הניהול לברירת המחדל? פעולה זו תמחוק את כל השינויים שעשית בניהול.")) {
                    localStorage.removeItem(STORAGE_KEY);
                    setConfig(DEFAULT_CONFIG);
                }
            };

            const exportConfig = () => {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href",     dataStr);
                downloadAnchorNode.setAttribute("download", "oneflow_calculator_backup.json");
                document.body.appendChild(downloadAnchorNode); 
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const importConfig = (event) => {
                const fileReader = new FileReader();
                fileReader.readAsText(event.target.files[0], "UTF-8");
                fileReader.onload = e => {
                    try {
                        const parsedData = JSON.parse(e.target.result);
                        if (parsedData && parsedData.modules) {
                            // --- מיגרציה: התאמת קובץ ישן למבנה החדש ---
                            if (parsedData.enableUsers === undefined) parsedData.enableUsers = true;
                            if (parsedData.enableGlobalTiers === undefined && parsedData.enableTiers === undefined) {
                                parsedData.enableGlobalTiers = true;
                            } else if (parsedData.enableGlobalTiers === undefined) {
                                parsedData.enableGlobalTiers = parsedData.enableTiers; // תמיכה במפתח הישן
                            }
                            if (parsedData.enableAI === undefined) parsedData.enableAI = true;

                            if (!parsedData.publicUserPackages) parsedData.publicUserPackages = DEFAULT_CONFIG.publicUserPackages;
                            if (!parsedData.privateUserPackages) parsedData.privateUserPackages = DEFAULT_CONFIG.privateUserPackages;
                            if (!parsedData.globalTiers) parsedData.globalTiers = parsedData.tiers || DEFAULT_CONFIG.globalTiers;

                            parsedData.modules = parsedData.modules.map(m => ({
                                ...m,
                                tiers: m.tiers && m.tiers.length > 0 ? m.tiers : generateDefaultTiers(m.id),
                                note: m.note || ''
                            }));

                            setConfig(parsedData);
                            alert("ההגדרות נטענו והותאמו לגרסה החדשה בהצלחה!");
                        } else {
                            alert("קובץ לא חוקי או פגום.");
                        }
                    } catch (error) {
                        alert("שגיאה בקריאת הקובץ.");
                    }
                };
                event.target.value = null;
            };

            // --- Render Components ---
            const ModuleButton = ({ module, isSelected }) => (
                <button onClick={() => toggleModule(module.id)} className={`relative flex flex-col items-center justify-center p-4 rounded-xl transition-all border-2 ${isSelected ? 'border-blue-600 bg-blue-50 shadow-md' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                    <div className={`mb-2 ${isSelected ? 'text-blue-600' : 'text-slate-400'}`}><Icon name={module.icon} size={24} /></div>
                    <span className={`text-sm font-bold text-center ${isSelected ? 'text-blue-800' : 'text-slate-600'}`}>{module.name}</span>
                    {isSelected && <div className="absolute top-2 right-2 text-blue-600"><Icon name="check-circle-2" size={16} /></div>}
                </button>
            );

            return (
                <div dir="rtl" className="min-h-screen bg-slate-50">
                    
                    {/* Header */}
                    <header className="no-print sticky top-0 z-50 bg-white border-b shadow-sm h-16 flex items-center justify-between px-6">
                        <div className="flex items-center gap-4">
                            <img src="oneflowlogo.png" alt="ONEFLOW 360 PRO" className="h-8 object-contain" onError={(e) => { e.target.style.display='none'; e.target.nextSibling.style.display='flex'; }} />
                            <div style={{display:'none'}} className="items-center gap-2">
                                <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center font-bold text-lg">1</div>
                                <div className="text-xl font-bold">ONEFLOW <span className="text-blue-600">360 PRO</span></div>
                            </div>
                            <span className="text-sm font-medium text-slate-400 border-r-2 border-slate-200 pr-4 hidden lg:block">מחשבון אומדן פרויקטים למיישם</span>
                        </div>
                        <div className="flex items-center gap-3">
                             <input type="text" placeholder="שם המיישם" value={implementerName} onChange={e => setImplementerName(e.target.value)} className="hidden lg:block p-2 border border-blue-200 rounded-lg text-sm w-32 bg-blue-50 placeholder-blue-400 font-bold" />
                             <input type="text" placeholder="שם פרויקט / לקוח" value={clientName} onChange={e => setClientName(e.target.value)} className="hidden md:block p-2 border rounded-lg text-sm w-40 bg-slate-50" />
                             <input type="date" value={quoteDate} onChange={e => setQuoteDate(e.target.value)} className="hidden md:block p-2 border rounded-lg text-sm bg-slate-50" />
                             
                             <button onClick={clearUserSelections} className="flex items-center gap-1 p-2 text-sm font-bold text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                                 <Icon name="rotate-ccw" size={16} /> <span className="hidden md:inline">נקה</span>
                             </button>

                            <button onClick={() => setIsAdminOpen(true)} className="p-2 bg-slate-100 rounded-full hover:bg-slate-200 text-slate-600"><Icon name="settings" /></button>
                        </div>
                    </header>

                    {/* Main Interface */}
                    <main className="no-print max-w-[90rem] mx-auto p-4 md:p-8 flex flex-col lg:flex-row gap-8">
                        
                        {/* Center Column - Configurator */}
                        <div className="flex-grow space-y-8 pb-24">
                            
                            {/* Mobile Inputs */}
                            <div className="lg:hidden space-y-2 bg-white p-4 rounded-xl border shadow-sm">
                                <input type="text" placeholder="שם המיישם" value={implementerName} onChange={e => setImplementerName(e.target.value)} className="w-full p-3 border rounded-xl bg-blue-50 font-bold" />
                                <input type="text" placeholder="שם פרויקט / לקוח" value={clientName} onChange={e => setClientName(e.target.value)} className="w-full p-3 border rounded-xl" />
                                <input type="date" value={quoteDate} onChange={e => setQuoteDate(e.target.value)} className="w-full p-3 border rounded-xl" />
                            </div>

                            {/* 1. Modules Selection */}
                            <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700"><Icon name="database" className="text-blue-500"/> {config.uiText.modulesHeader}</h3>
                                <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 gap-3">
                                    {config.modules.map(m => <ModuleButton key={m.id} module={m} isSelected={selectedModules.includes(m.id)} />)}
                                </div>
                            </section>

                            {/* 2. Module Configuration Tree (NEW) */}
                            {selectedModules.length > 0 && (
                                <section className="bg-blue-50/50 p-6 rounded-3xl shadow-inner border border-blue-100">
                                    <h3 className="text-lg font-bold mb-6 flex items-center gap-2 text-blue-800"><Icon name="layers" className="text-blue-500"/> {config.uiText.moduleTreeHeader}</h3>
                                    <div className="space-y-5">
                                        {selectedModules.map(mId => {
                                            const m = config.modules.find(x => x.id === mId);
                                            const modConf = moduleConfigs[mId];
                                            if (!m || !modConf) return null;
                                            
                                            // מחשב מחיר ספציפי למודול להצגה בממשק
                                            const currentTier = m.tiers?.find(t => t.id === modConf.tierId);
                                            const userPkgs = modConf.accessType === 'public' ? config.publicUserPackages : config.privateUserPackages;
                                            const currentUserPkg = userPkgs.find(p => p.id === modConf.userPackageId) || userPkgs[0];
                                            const currentTotal = (currentTier?.price || 0) + (currentUserPkg?.price || 0);

                                            return (
                                                <div key={m.id} className="bg-white p-5 rounded-2xl border border-blue-100 shadow-sm transition-all hover:shadow-md">
                                                    
                                                    {/* כותרת מודול בעץ */}
                                                    <div className="flex justify-between items-center border-b pb-3 mb-4">
                                                        <div className="flex items-center gap-3 font-bold text-lg text-slate-800">
                                                            <div className="p-2 bg-blue-100 text-blue-600 rounded-lg"><Icon name={m.icon} size={20}/></div>
                                                            {m.name}
                                                            {m.note && <span className="text-xs font-normal text-slate-400 bg-slate-100 px-2 py-1 rounded-md hidden md:inline-block">{m.note}</span>}
                                                        </div>
                                                        <div className="text-xl font-black text-blue-700">${currentTotal} <span className="text-xs text-slate-400 font-normal">/חודש</span></div>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                        {/* סוג גישה (Public/Private) */}
                                                        <div className="space-y-2">
                                                            <label className="text-xs font-bold text-slate-500 block">סוג חשיפה / גישה למודול</label>
                                                            <div className="flex p-1 bg-slate-100 rounded-lg">
                                                                <button 
                                                                    onClick={() => {
                                                                        const newPkg = config.privateUserPackages[0]?.id || '';
                                                                        updateModuleConfig(m.id, 'accessType', 'private');
                                                                        updateModuleConfig(m.id, 'userPackageId', newPkg);
                                                                    }}
                                                                    className={`flex-1 py-2 text-sm font-bold rounded-md transition-all flex justify-center items-center gap-2 ${modConf.accessType === 'private' ? 'bg-white shadow text-slate-800' : 'text-slate-400 hover:text-slate-600'}`}
                                                                >
                                                                    <Icon name="lock" size={14}/> פנימי (Private)
                                                                </button>
                                                                <button 
                                                                    onClick={() => {
                                                                        const newPkg = config.publicUserPackages[0]?.id || '';
                                                                        updateModuleConfig(m.id, 'accessType', 'public');
                                                                        updateModuleConfig(m.id, 'userPackageId', newPkg);
                                                                    }}
                                                                    className={`flex-1 py-2 text-sm font-bold rounded-md transition-all flex justify-center items-center gap-2 ${modConf.accessType === 'public' ? 'bg-white shadow text-blue-700' : 'text-slate-400 hover:text-slate-600'}`}
                                                                >
                                                                    <Icon name="globe" size={14}/> חיצוני (Public)
                                                                </button>
                                                            </div>
                                                        </div>

                                                        {/* חבילת משתמשים למודול */}
                                                        <div className="space-y-2">
                                                            <label className="text-xs font-bold text-slate-500 block flex items-center justify-between">
                                                                חבילת משתמשים מורשים
                                                                <span className="text-blue-500">${currentUserPkg?.price || 0}</span>
                                                            </label>
                                                            <select 
                                                                value={modConf.userPackageId} 
                                                                onChange={(e) => updateModuleConfig(m.id, 'userPackageId', e.target.value)}
                                                                className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm font-bold focus:ring-2 ring-blue-200 outline-none"
                                                            >
                                                                {userPkgs.map(p => (
                                                                    <option key={p.id} value={p.id}>{p.name} (+${p.price})</option>
                                                                ))}
                                                            </select>
                                                        </div>

                                                        {/* מדרגת עומס/טרנזקציות למודול */}
                                                        <div className="space-y-2">
                                                            <label className="text-xs font-bold text-slate-500 block flex items-center justify-between">
                                                                מדרגת טרנזקציות / עומס
                                                                <span className="text-blue-500">${currentTier?.price || 0}</span>
                                                            </label>
                                                            <select 
                                                                value={modConf.tierId} 
                                                                onChange={(e) => updateModuleConfig(m.id, 'tierId', e.target.value)}
                                                                className="w-full p-2.5 border rounded-lg bg-slate-50 text-sm font-bold focus:ring-2 ring-blue-200 outline-none"
                                                            >
                                                                {m.tiers?.map(t => (
                                                                    <option key={t.id} value={t.id}>{t.name} (+${t.price})</option>
                                                                ))}
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            )
                                        })}
                                    </div>
                                </section>
                            )}

                            {/* Global Tiers (Optional via Admin) */}
                            {config.enableGlobalTiers && (
                                <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700"><Icon name="activity" className="text-blue-500"/> {config.uiText.tiersHeader}</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-4 gap-4">
                                        {config.globalTiers.map(t => (
                                            <button key={t.id} onClick={() => setSelectedGlobalTier(t.id)} className={`p-4 rounded-2xl border-2 text-right transition-all ${selectedGlobalTier === t.id ? 'border-blue-600 bg-blue-50 ring-1 ring-blue-200' : 'border-slate-100 hover:border-slate-200'}`}>
                                                <div className="font-bold text-slate-700 text-sm">{t.name}</div>
                                                <div className="text-[10px] text-slate-400 mb-2">עד {t.limit.toLocaleString()}</div>
                                                <div className="text-xl font-black text-slate-900">${t.price}</div>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {/* AI Packages */}
                            {config.enableAI && (
                                <section className="p-6 rounded-3xl border-2 border-violet-100 bg-gradient-to-br from-white to-violet-50/50">
                                    <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-violet-900"><Icon name="sparkles" className="text-violet-600"/> {config.uiText.aiHeader}</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {config.aiPackages.map(pkg => (
                                            <button key={pkg.id} onClick={() => setSelectedAI(pkg.id)} className={`p-5 rounded-2xl border transition-all text-right ${selectedAI === pkg.id ? 'border-violet-600 bg-white shadow-lg' : 'border-slate-200/60 bg-white/60 hover:bg-white'}`}>
                                                <div className="flex justify-between items-start">
                                                    <span className="font-bold text-violet-800">{pkg.name}</span>
                                                    <span className="font-black text-lg">${pkg.price}</span>
                                                </div>
                                                <p className="text-xs text-slate-500 mt-1">{pkg.description}</p>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            )}

                            {/* Custom Sections */}
                            {config.customSections.map(sec => (
                                <section key={sec.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                    <h3 className="text-lg font-bold mb-4 flex items-center gap-2 text-slate-700"><Icon name="puzzle" className="text-blue-500"/> {sec.title}</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {sec.packages.map(pkg => (
                                            <button key={pkg.id} onClick={() => setCustomSelections({...customSelections, [sec.id]: pkg.id})} className={`p-4 rounded-2xl border-2 transition-all flex justify-between items-center ${customSelections[sec.id] === pkg.id ? 'border-blue-600 bg-blue-50' : 'border-slate-100'}`}>
                                                <div className="text-right">
                                                    <div className="font-bold text-slate-800">{pkg.name}</div>
                                                    {pkg.isOneTime && <span className="text-[10px] bg-orange-50 text-orange-600 px-2 rounded font-bold">חד-פעמי</span>}
                                                </div>
                                                <div className="text-xl font-black text-slate-900">${pkg.price}</div>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                            ))}
                        </div>

                        {/* Sidebar Summary */}
                        <div className={`lg:w-96 flex-shrink-0 ${showSummary ? 'fixed inset-0 z-50 bg-white p-6 overflow-y-auto' : 'hidden lg:block'}`}>
                             {showSummary && <button onClick={() => setShowSummary(false)} className="absolute top-4 left-4 p-2 bg-slate-100 rounded-full"><Icon name="x"/></button>}
                             
                             <div className="lg:sticky lg:top-24 bg-white rounded-[2rem] shadow-2xl border border-slate-200 overflow-hidden">
                                <div className="bg-slate-900 text-white p-8">
                                    <h2 className="text-2xl font-black uppercase tracking-tight">סיכום אומדן פנימי</h2>
                                </div>
                                <div className="p-8 space-y-6">
                                    
                                    <div className="space-y-3 pb-6 border-b border-dashed border-slate-200 text-sm">
                                        <div className="flex justify-between font-bold text-slate-700"><span>מודולים וחבילות תשתית</span><span>${totals.modulesMRR.toLocaleString()}</span></div>
                                        {config.enableGlobalTiers && <div className="flex justify-between text-slate-600"><span>חבילת טרנזקציות מערכתית</span><span>${(totals.globalTierObj?.price || 0).toLocaleString()}</span></div>}
                                        
                                        {/* פירוט תוספות חודשיות */}
                                        {totals.mrrBreakdown.map((item, i) => (
                                            <div key={i} className="flex justify-between text-blue-700 bg-blue-50 p-2 rounded text-xs font-bold items-center mt-2">
                                                <span className="truncate pl-2">{item.label}</span>
                                                <span>${item.price.toLocaleString()}</span>
                                            </div>
                                        ))}
                                    </div>

                                    {/* MRR */}
                                    <div>
                                        <div className="flex justify-between items-end mb-1">
                                            <span className="text-xs font-black text-blue-600 uppercase tracking-widest">אומדן חודשי קבוע (MRR)</span>
                                            <span className="text-4xl font-black text-slate-900 leading-none">${totals.totalMRR.toLocaleString()}</span>
                                        </div>
                                        <div className="text-left text-xs font-bold text-slate-400">≈ {Math.round(totals.nisMRR).toLocaleString()} ₪</div>
                                    </div>

                                    {/* SETUP */}
                                    <div className="bg-orange-50 p-6 rounded-2xl border border-orange-100">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-xs font-black text-orange-800 uppercase tracking-wide">הקמה ואפיון (Setup)</span>
                                            <span className="text-2xl font-black text-orange-700">${totals.totalSetup.toLocaleString()}</span>
                                        </div>

                                        {/* פירוט תוספות חד פעמיות */}
                                        {totals.setupBreakdown.length > 0 && (
                                            <div className="mb-3 space-y-1 mt-3 border-t border-orange-200/50 pt-2">
                                                {totals.setupBreakdown.map((item, i) => (
                                                    <div key={i} className="flex justify-between text-[10px] text-orange-800 opacity-80">
                                                        <span>{item.label}</span><span>${item.price}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        )}

                                        <div className="text-left text-[10px] text-orange-600 font-bold mb-3 border-t border-orange-200 pt-2 mt-2">≈ {Math.round(totals.nisSetup).toLocaleString()} ₪</div>
                                        <div className="flex items-center gap-2 text-xs font-black text-orange-800 bg-white/50 p-2 rounded-lg">
                                            <Icon name="clock" size={16}/> <span>זמן משוער: {totals.totalSetupDays} ימי עבודה</span>
                                        </div>
                                    </div>

                                    <button onClick={handlePrint} className="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black text-lg rounded-xl shadow-lg flex items-center justify-center gap-2">
                                        <Icon name="file-text"/> הפק אומדן (PDF)
                                    </button>
                                </div>
                            </div>
                        </div>
                    </main>
                    
                    {/* Mobile Floating Button */}
                    <div className="no-print fixed bottom-4 left-4 right-4 lg:hidden z-40">
                        <button onClick={() => setShowSummary(true)} className="w-full bg-slate-900 text-white p-4 rounded-full shadow-2xl flex justify-between font-bold border border-slate-700">
                            <span>סיכום אומדן</span>
                            <span>${totals.totalMRR.toLocaleString()} /חודש</span>
                        </button>
                    </div>

                    {/* --- Admin Full Screen Modal --- */}
                    {isAdminOpen && (
                        <div className="admin-modal fixed inset-0 z-[60] bg-white overflow-hidden flex flex-col">
                            {/* Admin Header */}
                            <div className="flex justify-between items-center p-6 border-b bg-slate-50">
                                <h2 className="text-2xl font-bold flex items-center gap-2 text-slate-800"><Icon name="settings" className="text-blue-600"/> הגדרות מערכת (שינויים נשמרים אוטומטית)</h2>
                                <div className="flex gap-4">
                                    <input type="file" accept=".json" style={{display: 'none'}} ref={fileInputRef} onChange={importConfig} />
                                    <button onClick={() => fileInputRef.current.click()} className="text-slate-600 hover:bg-slate-200 font-bold text-sm flex items-center gap-1 border border-slate-300 px-3 py-1.5 rounded-lg"><Icon name="upload" size={14}/> ייבוא מגיבוי</button>
                                    <button onClick={exportConfig} className="text-blue-600 hover:bg-blue-50 font-bold text-sm flex items-center gap-1 border border-blue-200 px-3 py-1.5 rounded-lg"><Icon name="download" size={14}/> ייצא לגיבוי</button>
                                    <div className="w-px h-6 bg-slate-300 mx-2"></div>
                                    <button onClick={resetAdminConfig} className="text-red-500 hover:bg-red-50 font-bold text-sm flex items-center gap-1 border border-red-200 px-3 py-1.5 rounded-lg"><Icon name="rotate-ccw" size={14}/> איפוס מוחלט</button>
                                    <button onClick={() => setIsAdminOpen(false)} className="bg-slate-900 hover:bg-slate-800 text-white px-6 py-2 rounded-lg font-bold">סגור חלון</button>
                                </div>
                            </div>

                            {/* Admin Content - Scrollable */}
                            <div className="flex-grow overflow-y-auto p-8 custom-scroll">
                                <div className="max-w-5xl mx-auto space-y-12 pb-20">
                                    
                                    {/* Global Settings */}
                                    <div className="grid grid-cols-1 gap-8">
                                        <div className="p-6 bg-orange-50 rounded-2xl border border-orange-100">
                                            <h3 className="font-bold mb-4 text-orange-800 text-lg border-b border-orange-200 pb-2">הגדרות אומדן פרויקט והקמה גלובליות</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                                <div><label className="text-xs font-bold text-orange-700 mb-1 block">תעריף שעה ($)</label><input type="number" className="w-full p-3 border border-orange-200 rounded-xl bg-white" value={config.setupHourlyRate} onChange={e => updateConfigValue(['setupHourlyRate'], Number(e.target.value))} /></div>
                                                <div><label className="text-xs font-bold text-orange-700 mb-1 block">שעות ביום עבודה</label><input type="number" className="w-full p-3 border border-orange-200 rounded-xl bg-white" value={config.setupHoursPerDay} onChange={e => updateConfigValue(['setupHoursPerDay'], Number(e.target.value))} /></div>
                                                <div><label className="text-xs font-bold text-orange-700 mb-1 block">שער דולר (₪)</label><input type="number" step="0.1" className="w-full p-3 border border-orange-200 rounded-xl bg-white" value={config.exchangeRate} onChange={e => updateConfigValue(['exchangeRate'], Number(e.target.value))} /></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* NEW: User Packages Setup (Public / Private) */}
                                    <div className="p-6 bg-white rounded-2xl border shadow-sm">
                                        <h3 className="font-bold text-xl text-blue-800 border-b pb-3 mb-6">ניהול חבילות רישוי למודולים (Public / Private)</h3>
                                        
                                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                            {/* Public Packages */}
                                            <div className="bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                                                <h4 className="font-bold text-blue-800 mb-4 flex items-center gap-2"><Icon name="globe" size={18}/> חבילות משתמשים - חיבור חיצוני (Public)</h4>
                                                <div className="space-y-3">
                                                    {config.publicUserPackages.map((pkg, idx) => (
                                                        <div key={pkg.id} className="flex gap-2 items-center bg-white p-2 rounded-lg border">
                                                            <input value={pkg.name} onChange={e => updateConfigValue(['publicUserPackages', idx, 'name'], e.target.value)} className="flex-grow p-2 text-sm border rounded font-bold"/>
                                                            <input type="number" value={pkg.price} onChange={e => updateConfigValue(['publicUserPackages', idx, 'price'], Number(e.target.value))} className="w-24 p-2 text-sm border rounded font-black"/>
                                                            <button onClick={() => {
                                                                const arr = [...config.publicUserPackages];
                                                                arr.splice(idx, 1);
                                                                updateConfigValue(['publicUserPackages'], arr);
                                                            }} className="text-red-400 p-2"><Icon name="x" size={16}/></button>
                                                        </div>
                                                    ))}
                                                    <button onClick={() => addUserPackage('public')} className="text-xs font-bold text-blue-600 bg-white border border-blue-200 px-3 py-1.5 rounded-lg">+ הוסף חבילת Public</button>
                                                </div>
                                            </div>

                                            {/* Private Packages */}
                                            <div className="bg-slate-100 p-4 rounded-xl border border-slate-200">
                                                <h4 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><Icon name="lock" size={18}/> חבילות משתמשים - פנים ארגוני (Private)</h4>
                                                <div className="space-y-3">
                                                    {config.privateUserPackages.map((pkg, idx) => (
                                                        <div key={pkg.id} className="flex gap-2 items-center bg-white p-2 rounded-lg border">
                                                            <input value={pkg.name} onChange={e => updateConfigValue(['privateUserPackages', idx, 'name'], e.target.value)} className="flex-grow p-2 text-sm border rounded font-bold"/>
                                                            <input type="number" value={pkg.price} onChange={e => updateConfigValue(['privateUserPackages', idx, 'price'], Number(e.target.value))} className="w-24 p-2 text-sm border rounded font-black"/>
                                                            <button onClick={() => {
                                                                const arr = [...config.privateUserPackages];
                                                                arr.splice(idx, 1);
                                                                updateConfigValue(['privateUserPackages'], arr);
                                                            }} className="text-red-400 p-2"><Icon name="x" size={16}/></button>
                                                        </div>
                                                    ))}
                                                    <button onClick={() => addUserPackage('private')} className="text-xs font-bold text-slate-600 bg-white border border-slate-300 px-3 py-1.5 rounded-lg">+ הוסף חבילת Private</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Global Tiers Setup */}
                                    <div className="p-6 bg-white rounded-2xl border shadow-sm">
                                        <div className="flex justify-between items-center border-b pb-2 mb-4">
                                            <h3 className="font-bold text-lg text-slate-800">חבילות טרנזקציות מערכתיות כלליות</h3>
                                            <label className="flex items-center gap-2 text-sm font-bold bg-slate-50 border px-3 py-1.5 rounded-lg cursor-pointer">
                                                <input type="checkbox" checked={config.enableGlobalTiers} onChange={e => updateConfigValue(['enableGlobalTiers'], e.target.checked)} className="w-4 h-4 text-blue-600"/> הצג אזור זה במחשבון
                                            </label>
                                        </div>
                                        {config.enableGlobalTiers && (
                                            <div className="space-y-4">
                                                <div>
                                                    <label className="text-xs font-bold text-slate-500 mb-1 block">כותרת מותאמת אישית</label>
                                                    <input value={config.uiText.tiersHeader} onChange={e => updateConfigValue(['uiText', 'tiersHeader'], e.target.value)} className="w-1/2 p-3 border rounded-xl bg-slate-50 font-bold mb-4"/>
                                                </div>
                                                <div className="space-y-3">
                                                    {config.globalTiers.map((tier, idx) => (
                                                        <div key={tier.id} className="flex gap-4 items-end bg-slate-50 p-4 rounded-xl border">
                                                            <div className="flex-grow">
                                                                <label className="text-[10px] font-bold text-slate-400">שם החבילה</label>
                                                                <input value={tier.name} onChange={e => updateConfigValue(['globalTiers', idx, 'name'], e.target.value)} className="w-full p-2 border rounded-lg font-bold text-sm"/>
                                                            </div>
                                                            <div className="w-32">
                                                                <label className="text-[10px] font-bold text-slate-400">כמות פעולות</label>
                                                                <input type="number" value={tier.limit} onChange={e => updateConfigValue(['globalTiers', idx, 'limit'], Number(e.target.value))} className="w-full p-2 border rounded-lg text-sm"/>
                                                            </div>
                                                            <div className="w-24">
                                                                <label className="text-[10px] font-bold text-slate-400">מחיר ($)</label>
                                                                <input type="number" value={tier.price} onChange={e => updateConfigValue(['globalTiers', idx, 'price'], Number(e.target.value))} className="w-full p-2 border rounded-lg font-bold text-sm"/>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Modules Management With Per-Module Tiers & Notes */}
                                    <div>
                                        <h3 className="font-bold text-2xl mb-2 text-slate-800">ניהול מודולים פנימיים ומדרגות עומס</h3>
                                        <p className="text-sm text-slate-500 mb-6">לכל מודול ניתן להגדיר מדרגות עומס שישפיעו על אומדן העלות החודשי.</p>
                                        
                                        <div className="space-y-6">
                                            {config.modules.map((m, idx) => (
                                                <div key={m.id} className="bg-white border-2 border-slate-200 p-5 rounded-2xl shadow-sm">
                                                    
                                                    {/* Module Header */}
                                                    <div className="flex flex-wrap md:flex-nowrap gap-4 items-start border-b pb-4 mb-4">
                                                        <button 
                                                            onClick={() => setIconPickerOpen(iconPickerOpen === idx ? null : idx)} 
                                                            className="p-3 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors relative"
                                                        >
                                                            <Icon name={m.icon} size={24}/>
                                                            {iconPickerOpen === idx && (
                                                                <div className="absolute top-14 right-0 z-50 bg-white border shadow-2xl rounded-xl p-3 grid grid-cols-5 gap-2 w-64 h-48 overflow-y-auto">
                                                                    {ICON_LIST.map(icon => (
                                                                        <button key={icon} onClick={(e) => { e.stopPropagation(); updateConfigValue(['modules', idx, 'icon'], icon); setIconPickerOpen(null); }} className="p-2 hover:bg-slate-100 rounded text-slate-700"><Icon name={icon} size={20}/></button>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </button>
                                                        
                                                        <div className="flex-grow space-y-3">
                                                            <div>
                                                                <label className="text-[10px] font-bold text-slate-400 uppercase">שם מודול</label>
                                                                <input value={m.name} onChange={e => updateConfigValue(['modules', idx, 'name'], e.target.value)} className="w-full p-2 bg-transparent border-b-2 border-slate-200 focus:border-blue-500 outline-none font-black text-lg text-slate-800"/>
                                                            </div>
                                                            <div>
                                                                <label className="text-[10px] font-bold text-slate-400 uppercase">הערה / תיאור פנימי (יופיע למיישם וב-PDF)</label>
                                                                <textarea 
                                                                    value={m.note || ''} 
                                                                    onChange={e => updateConfigValue(['modules', idx, 'note'], e.target.value)} 
                                                                    className="w-full p-2 border rounded-lg text-sm bg-slate-50 focus:bg-white outline-none"
                                                                    placeholder="הזן הערה חופשית..."
                                                                    rows="2"
                                                                ></textarea>
                                                            </div>
                                                        </div>
                                                        
                                                        <div className="w-24">
                                                            <label className="text-[10px] font-bold text-slate-400 uppercase">ימי אפיון והקמה</label>
                                                            <input type="number" value={m.setupDays} onChange={e => updateConfigValue(['modules', idx, 'setupDays'], Number(e.target.value))} className="w-full p-2 bg-slate-50 border rounded-lg text-center font-bold"/>
                                                        </div>
                                                        
                                                        <div className="flex gap-2">
                                                            <button onClick={() => duplicateModule(m.id)} className="text-blue-500 hover:text-blue-700 bg-blue-50 p-2 rounded-lg transition-colors" title="שכפל מודול"><Icon name="copy" size={18}/></button>
                                                            <button onClick={() => {
                                                                if(window.confirm('למחוק מודול זה?')) {
                                                                    const newMods = config.modules.filter(x => x.id !== m.id);
                                                                    updateConfigValue(['modules'], newMods);
                                                                }
                                                            }} className="text-red-400 hover:text-red-600 bg-red-50 p-2 rounded-lg transition-colors" title="מחק מודול"><Icon name="trash-2" size={18}/></button>
                                                        </div>
                                                    </div>

                                                    {/* Module Tiers */}
                                                    <div className="pl-4 border-r-4 border-blue-200 space-y-3 mr-4">
                                                        <label className="text-xs font-bold text-blue-800 block mb-2">מדרגות/חבילות עומס למודול זה (MRR):</label>
                                                        {m.tiers?.map((tier, tIdx) => (
                                                            <div key={tier.id} className="flex gap-3 items-center bg-slate-50 p-2 rounded-xl border border-slate-200">
                                                                <input value={tier.name} onChange={e => updateConfigValue(['modules', idx, 'tiers', tIdx, 'name'], e.target.value)} className="flex-grow p-2 text-sm border rounded bg-white" placeholder="שם המדרגה..."/>
                                                                <div className="relative w-32">
                                                                    <span className="absolute left-3 top-2.5 text-slate-400 text-sm font-bold">$</span>
                                                                    <input type="number" value={tier.price} onChange={e => updateConfigValue(['modules', idx, 'tiers', tIdx, 'price'], Number(e.target.value))} className="w-full p-2 pl-6 text-sm border rounded font-black text-slate-700 bg-white"/>
                                                                </div>
                                                                <button onClick={() => {
                                                                    const updatedTiers = [...m.tiers];
                                                                    updatedTiers.splice(tIdx, 1);
                                                                    updateConfigValue(['modules', idx, 'tiers'], updatedTiers);
                                                                }} className="text-red-300 hover:text-red-500 p-2"><Icon name="x" size={16}/></button>
                                                            </div>
                                                        ))}
                                                        <button onClick={() => {
                                                            const updatedTiers = m.tiers ? [...m.tiers] : [];
                                                            updatedTiers.push({ id: `t_${Date.now()}`, name: 'מדרגה חדשה', price: 100 });
                                                            updateConfigValue(['modules', idx, 'tiers'], updatedTiers);
                                                        }} className="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded-lg mt-2 inline-flex items-center gap-1 hover:bg-blue-100">+ הוסף מדרגה למודול</button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        
                                        {/* Add Module */}
                                        <div className="flex gap-4 bg-slate-100 p-6 rounded-2xl border border-dashed border-slate-300 items-end mt-6">
                                            <div className="flex-grow">
                                                <label className="text-xs font-bold text-slate-600 mb-1 block">הקמת מודול פנימי חדש</label>
                                                <input value={newModule.name} onChange={e => setNewModule({...newModule, name: e.target.value})} className="w-full p-3 border rounded-xl bg-white" placeholder="שם המודול..."/>
                                            </div>
                                            <div className="w-32">
                                                <label className="text-xs font-bold text-slate-600 mb-1 block">ימי הקמה</label>
                                                <input type="number" value={newModule.setupDays} onChange={e => setNewModule({...newModule, setupDays: Number(e.target.value)})} className="w-full p-3 border rounded-xl bg-white"/>
                                            </div>
                                            <button onClick={addNewModule} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition-colors shadow-lg">צור מודול</button>
                                        </div>
                                    </div>

                                    {/* AI Packages */}
                                    <div className="pt-8 border-t">
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-xl text-violet-700">שילוב יכולות AI</h3>
                                            <label className="flex items-center gap-2 text-sm font-bold bg-slate-50 border px-3 py-1.5 rounded-lg cursor-pointer">
                                                <input type="checkbox" checked={config.enableAI} onChange={e => updateConfigValue(['enableAI'], e.target.checked)} className="w-4 h-4 text-violet-600"/> הצג אזור זה במחשבון
                                            </label>
                                        </div>
                                        
                                        {config.enableAI && (
                                            <div className="space-y-3">
                                                <div>
                                                    <label className="text-xs font-bold text-slate-500 mb-1 block">כותרת מותאמת אישית</label>
                                                    <input value={config.uiText.aiHeader} onChange={e => updateConfigValue(['uiText', 'aiHeader'], e.target.value)} className="w-1/2 p-3 border rounded-xl bg-slate-50 font-bold mb-4"/>
                                                </div>
                                                {config.aiPackages.map((pkg, idx) => (
                                                    <div key={pkg.id} className="flex flex-wrap md:flex-nowrap gap-4 items-center bg-white p-4 rounded-xl border shadow-sm">
                                                        <input value={pkg.name} onChange={e => updateConfigValue(['aiPackages', idx, 'name'], e.target.value)} className="w-full md:w-1/4 p-2 border rounded-lg font-bold text-sm" placeholder="שם חבילה"/>
                                                        <input value={pkg.description} onChange={e => updateConfigValue(['aiPackages', idx, 'description'], e.target.value)} className="w-full md:flex-grow p-2 border rounded-lg text-sm" placeholder="תיאור"/>
                                                        <input type="number" value={pkg.price} onChange={e => updateConfigValue(['aiPackages', idx, 'price'], Number(e.target.value))} className="w-24 p-2 border rounded-lg font-bold text-sm text-center" placeholder="$"/>
                                                        <label className="flex items-center gap-2 text-xs font-bold cursor-pointer bg-slate-50 px-3 py-2 rounded-lg border">
                                                            <input type="checkbox" checked={pkg.isOneTime} onChange={e => updateConfigValue(['aiPackages', idx, 'isOneTime'], e.target.checked)} className="w-4 h-4"/> חיוב חד-פעמי
                                                        </label>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>

                                    {/* Custom Sections */}
                                    <div className="pt-8 border-t">
                                        <h3 className="font-bold text-xl mb-6 text-slate-800">אזורי אומדן נוספים (שרתים, תמיכה וכו')</h3>
                                        {config.customSections.map((sec, sIdx) => (
                                            <div key={sec.id} className="mb-8 bg-slate-50 p-6 rounded-3xl border border-slate-200 relative group">
                                                <button onClick={() => {
                                                    const newSecs = [...config.customSections];
                                                    newSecs.splice(sIdx, 1);
                                                    updateConfigValue(['customSections'], newSecs);
                                                }} className="absolute top-6 left-6 text-red-400 hover:text-red-600 bg-white p-2 rounded-lg shadow-sm border transition-opacity"><Icon name="trash-2" size={18}/></button>
                                                
                                                <div className="mb-6 w-3/4">
                                                    <label className="text-xs font-bold text-slate-500 block mb-1">כותרת האזור</label>
                                                    <input value={sec.title} onChange={e => updateConfigValue(['customSections', sIdx, 'title'], e.target.value)} className="text-2xl font-black bg-white border border-slate-200 rounded-xl w-full p-3 outline-none focus:border-blue-500 focus:ring-2 ring-blue-100"/>
                                                </div>
                                                
                                                <div className="space-y-3 bg-white p-4 rounded-2xl border">
                                                    <label className="text-xs font-bold text-slate-500 block mb-2">אפשרויות אומדן בתוך האזור:</label>
                                                    {sec.packages.map((pkg, pIdx) => (
                                                        <div key={pkg.id} className="flex flex-wrap md:flex-nowrap gap-3 items-center bg-slate-50 p-2 rounded-xl border">
                                                            <input value={pkg.name} onChange={e => updateConfigValue(['customSections', sIdx, 'packages', pIdx, 'name'], e.target.value)} className="flex-grow p-2 border rounded-lg text-sm font-bold" placeholder="שם האופציה"/>
                                                            <div className="relative">
                                                                <span className="absolute left-3 top-2.5 text-slate-400 text-xs">$</span>
                                                                <input type="number" value={pkg.price} onChange={e => updateConfigValue(['customSections', sIdx, 'packages', pIdx, 'price'], Number(e.target.value))} className="w-24 p-2 pl-6 border rounded-lg text-sm font-black"/>
                                                            </div>
                                                            <label className="flex items-center gap-1 text-xs bg-white px-3 py-2 rounded-lg border font-bold cursor-pointer"><input type="checkbox" checked={pkg.isOneTime} onChange={e => updateConfigValue(['customSections', sIdx, 'packages', pIdx, 'isOneTime'], e.target.checked)}/> חיוב חד-פעמי</label>
                                                            <button onClick={() => {
                                                                const newSecs = [...config.customSections];
                                                                newSecs[sIdx].packages.splice(pIdx, 1);
                                                                updateConfigValue(['customSections'], newSecs);
                                                            }} className="text-red-300 hover:text-red-500 p-2"><Icon name="x" size={18}/></button>
                                                        </div>
                                                    ))}
                                                    <button onClick={() => {
                                                        const newSecs = [...config.customSections];
